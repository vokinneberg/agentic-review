name: Build & Push Tool Images

on:
  push:
    branches: [ master ]
    paths:
      - "tools/**"
  pull_request:
    branches: [ master ]
    paths:
      - "tools/**"

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    name: Lint & Test diff-tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/diff-tools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: tools/diff-tools/requirements-dev.txt

      - name: Create venv and install dependencies
        run: uv venv && uv pip install -r requirements-dev.txt

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest -v --cov --cov-report=term-missing -m unit

  build:
    name: Build & Push diff-tools image
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/homelab-diff-tools
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools/diff-tools
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
