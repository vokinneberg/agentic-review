name: Terraform Apply

on:
  push:
    branches: [ master ]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
      - ".tflint.hcl"

permissions:
  contents: write

env:
  TF_VERSION: "1.10.0"

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cluster_id: ${{ steps.cluster_id.outputs.value }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          TF_VAR_kagent_anthropic_api_key: ${{ secrets.KAGENT_ANTHROPIC_API_KEY }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
          TF_VAR_github_token: ${{ secrets.GITHUB_MCP_TOKEN }}

      - name: Get cluster ID
        id: cluster_id
        run: echo "value=$(terraform output -raw cluster_id)" >> "$GITHUB_OUTPUT"

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/terraform.tfstate
          git diff --staged --quiet || git commit -m "chore: update terraform state [skip ci]"
          git push
        working-directory: ${{ github.workspace }}

  clusterlint:
    name: Clusterlint
    runs-on: ubuntu-latest
    needs: apply

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ needs.apply.outputs.cluster_id }}

      - name: Install clusterlint
        run: go install github.com/digitalocean/clusterlint/cmd/clusterlint@latest

      - name: Run clusterlint
        run: clusterlint run
