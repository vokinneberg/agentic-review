name: Terraform Apply

on:
  push:
    branches: [ master ]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
      - ".tflint.hcl"

permissions:
  contents: write

env:
  TF_VERSION: "1.10.0"

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cluster_id: ${{ steps.cluster_id.outputs.value }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          TF_VAR_kagent_anthropic_api_key: ${{ secrets.KAGENT_ANTHROPIC_API_KEY }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
          TF_VAR_github_token: ${{ secrets.GITHUB_MCP_TOKEN }}
          TF_VAR_agentgateway_api_key: ${{ secrets.AGENTGATEWAY_API_KEY }}

      - name: Get cluster ID
        id: cluster_id
        run: echo "value=$(terraform output -raw cluster_id)" >> "$GITHUB_OUTPUT"

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/terraform.tfstate
          git diff --staged --quiet || git commit -m "chore: update terraform state [skip ci]"
          git push
        working-directory: ${{ github.workspace }}

  clusterlint:
    name: Clusterlint
    runs-on: ubuntu-latest
    needs: apply

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Trigger clusterlint run
        run: doctl kubernetes cluster lint ${{ needs.apply.outputs.cluster_id }}

      - name: Poll for results
        run: |
          echo "Waiting for clusterlint to complete..."
          for i in $(seq 1 12); do
            RAW=$(doctl kubernetes cluster lint ${{ needs.apply.outputs.cluster_id }} --output json 2>/dev/null || true)
            RESULT=$(echo "$RAW" | jq '.' 2>/dev/null || echo '[]')
            STATUS=$(echo "$RESULT" | jq -r '.[0].run_status // "not_started"')
            if [ "$STATUS" = "completed" ]; then
              echo "Clusterlint completed."
              ERRORS=$(echo "$RESULT" | jq '[.[0].diagnostics[] | select(.severity == "error")] | length')
              echo "Errors found: $ERRORS"
              echo "$RESULT" | jq '.[0].diagnostics[]'
              [ "$ERRORS" -eq 0 ]
              exit $?
            fi
            echo "Status: $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Clusterlint timed out."
          exit 1
