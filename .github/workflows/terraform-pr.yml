name: Terraform PR Validation

on:
  pull_request:
    branches: [ master ]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
      - ".tflint.hcl"

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.10.0"
  TFLINT_VERSION: "v0.53.0"

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: TFLint Init
        run: tflint --init
        working-directory: ${{ github.workspace }}

      - name: TFLint
        run: tflint --chdir=terraform
        working-directory: ${{ github.workspace }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          TF_VAR_kagent_anthropic_api_key: ${{ secrets.KAGENT_ANTHROPIC_API_KEY }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
          TF_VAR_github_token: ${{ secrets.GITHUB_MCP_TOKEN }}
          TF_VAR_agentgateway_api_key: ${{ secrets.AGENTGATEWAY_API_KEY }}

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
