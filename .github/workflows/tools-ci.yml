name: Tools CI

on:
  pull_request:
    branches: [master]
    paths:
      - "tools/**"
      - ".github/workflows/tools-ci.yml"

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & Test diff-tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/diff-tools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: tools/diff-tools/requirements-dev.txt

      - name: Create venv and install dependencies
        run: uv venv && uv pip install -r requirements-dev.txt

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest -v --cov --cov-report=term-missing -m unit
