version: "3"

dotenv: [ ".env" ]

vars:
  TF_DIR: terraform
  DIFF_TOOLS_DIR: tools/diff-tools

env:
  TF_VAR_do_token: "{{.DIGITALOCEAN_TOKEN}}"
  TF_VAR_kagent_anthropic_api_key: "{{.KAGENT_ANTHROPIC_API_KEY}}"
  TF_VAR_ghcr_token: "{{.GITHUB_TOKEN}}"
  TF_VAR_github_token: "{{.GITHUB_MCP_TOKEN}}"
  TF_VAR_agentgateway_api_key: "{{.AGENTGATEWAY_API_KEY}}"

tasks:
  install-tools:
    desc: Install required CLI tools (terraform, tflint, uv)
    cmds:
      - brew install terraform
      - brew install tflint
      - brew install uv
    status:
      - which terraform
      - which tflint
      - which uv

  # ── Python venv ─────────────────────────────────────────────────────────────

  venv:
    desc: Create virtual environment and install all dependencies for diff-tools
    deps: [ install-tools ]
    dir: "{{.DIFF_TOOLS_DIR}}"
    env:
      VIRTUAL_ENV: ""
    cmds:
      - uv venv --python 3.12
      - uv pip install -r requirements-dev.txt
    status:
      - test -d {{.DIFF_TOOLS_DIR}}/.venv

  # ── Lint ─────────────────────────────────────────────────────────────────────

  lint:
    desc: Run TFLint (Terraform) and ruff (Python)
    deps: [ install-tools, venv ]
    cmds:
      - tflint --init
      - tflint --chdir={{.TF_DIR}}
      - uv run --directory {{.DIFF_TOOLS_DIR}} ruff check .
      - uv run --directory {{.DIFF_TOOLS_DIR}} ruff format --check .

  # ── Test ─────────────────────────────────────────────────────────────────────

  test:
    desc: Run diff-tools unit tests with coverage
    deps: [ venv ]
    dir: "{{.DIFF_TOOLS_DIR}}"
    env:
      VIRTUAL_ENV: ""
    cmds:
      - uv run pytest -v --cov --cov-report=term-missing -m unit

  # ── Terraform ────────────────────────────────────────────────────────────────

  init:
    desc: Terraform init
    deps: [ install-tools ]
    dir: "{{.TF_DIR}}"
    cmds:
      - terraform init

  plan:
    desc: Terraform plan
    deps: [ init ]
    dir: "{{.TF_DIR}}"
    cmds:
      - terraform plan

  apply:
    desc: Terraform apply
    deps: [ init ]
    dir: "{{.TF_DIR}}"
    cmds:
      - terraform apply

  destroy-cluster:
    desc: Destroy the Kubernetes cluster and all resources inside it
    deps: [ init ]
    dir: "{{.TF_DIR}}"
    cmds:
      - terraform destroy -target=digitalocean_kubernetes_cluster.homelab
        -target=helm_release.kagent -target=helm_release.kagent_crds
        -target=kubernetes_namespace.kagent -target=kubernetes_namespace.apps

  destroy:
    desc: Terraform destroy all resources
    deps: [ init ]
    dir: "{{.TF_DIR}}"
    cmds:
      - terraform destroy

  # ── Cluster access ───────────────────────────────────────────────────────────

  kagent-ui:
    desc: Port-forward kagent UI to http://localhost:8080
    cmds:
      - terraform -chdir={{.TF_DIR}} output -raw kubeconfig >
        /tmp/homelab.kubeconfig
      - echo "kagent UI → http://localhost:8080"
      - KUBECONFIG=/tmp/homelab.kubeconfig kubectl port-forward -n kagent
        svc/kagent-ui 8080:8080
