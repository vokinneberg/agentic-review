version: "3.1"
services:

  mongo-replica-1:
    image: mongo:4.0-xenial
    command:  mongod --smallfiles --noauth --replSet rs-waves-voting --oplogSize 3
    environment:
      TERM: xterm
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - mongo-data-1:/data/db
      - mongo-config-1:/data/configdb
    networks:
      - overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.mongo.replica == 1

  mongo-replica-2:
    image: mongo:4.0-xenial
    command: mongod --smallfiles --noauth --replSet rs-waves-voting --oplogSize 3
    environment:
      TERM: xterm
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - mongo-data-2:/data/db
      - mongo-config-2:/data/configdb
    networks:
      - overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.mongo.replica == 2

  mongo-replica-3:
    image: mongo:4.0-xenial
    command: mongod --smallfiles --noauth --replSet rs-waves-voting --oplogSize 3
    environment:
      TERM: xterm
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - mongo-data-3:/data/db
      - mongo-config-3:/data/configdb
    networks:
      - overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.mongo.replica == 3

  waves-voting-app:
    image: registry.gitlab.com/trustamust/waves-voting:1.0.1
    ports:
      - "443:443"
      - "80:80"
    environment:
      DB_HOST: mongo-replica-1,mongo-replica-2,mongo-replica-3
      DB_POSRT: 27017
      DB_NAME: waves-voting
    networks:
      - overlay
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints: 
          - node.role == worker
    depends_on: 
      - mongo-replica-1
      - mongo-replica-2
      - mongo-replica-3

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo-replica-1,mongo-replica-2,mongo-replica-3
      ME_CONFIG_MONGODB_PORT: 27017
    networks:
      - overlay
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
    depends_on: 
      - mongo-replica-1
      - mongo-replica-2
      - mongo-replica-3

networks:
  overlay:

volumes:
  mongo-data-1:
  mongo-data-2:
  mongo-data-3:
  mongo-config-1:
  mongo-config-2:
  mongo-config-3: